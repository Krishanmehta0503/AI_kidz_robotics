<script>
const products = [
    {
        id:1,
        name:"Basic Starter Kit for Arduino Starter with UNO R3",
        price:1200,
        images:["../Images/JPEG/ardino.jpg"],
        desc:"Electronic components"
    },
    {
        id:2,
        name:"2WD Ultrasonic Smart Tracking Moteur Robot Car Kit For Arduino",
        price:1500,
        images:["../Images/JPEG/Robot_Car_Arduino.jpg","../Images/JPEG/robot_1.jpg"],
        desc:"Complete robot car kit"
    },
    {
        id:3,
        name:"Robotic Arms",
        price:2000,
        images:["../Images/JPEG/robot_3.jpg","../Images/JPEG/ardino.jpg","../Images/JPEG/Robot_Car_Arduino.jpg"],
        desc:"Real world Robot"
    }
];

let selectedProduct = null;
let quantity = 1;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// LOAD PRODUCTS
const container = document.getElementById("productList");

products.forEach(p => {
    container.innerHTML += `
        <div class="col-md-4">
            <div class="product-card" onclick="openDetail(${p.id})">
                <img src="${p.images[0]}">
                <div class="p-3">
                    <h5>${p.name}</h5>
                    <p>₹${p.price}</p>
                </div>
            </div>
        </div>
    `;
});

// OPEN DETAIL
function openDetail(id){
    selectedProduct = products.find(p => p.id === id);
    quantity = 1;

    document.querySelector(".product-ui").classList.add("d-none");
    document.getElementById("productDetail").classList.remove("d-none");

    document.getElementById("detailTitle").innerText = selectedProduct.name;
    document.getElementById("detailDesc").innerText = selectedProduct.desc;
    document.getElementById("detailPrice").innerText = "₹" + selectedProduct.price;
    document.getElementById("detailMainImg").src = selectedProduct.images[0];
    document.getElementById("detailQty").innerText = quantity;

    let thumbs = document.getElementById("detailThumbs");
    thumbs.innerHTML = "";

    selectedProduct.images.forEach(img => {
        thumbs.innerHTML += `<img src="${img}" width="60" onclick="changeImage('${img}')">`;
    });
}

function changeImage(src){
    document.getElementById("detailMainImg").src = src;
}

function changeQty(val){
    quantity += val;
    if(quantity < 1) quantity = 1;
    document.getElementById("detailQty").innerText = quantity;
}

// ADD TO CART
function addToCart(){
    const existing = cart.find(p => p.id === selectedProduct.id);

    if(existing){
        existing.qty += quantity;
    } else {
        cart.push({...selectedProduct, qty: quantity});
    }

    renderCart();
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to Cart ✅");
}

// CART UI
function renderCart(){
    let list = document.getElementById("cartItems");
    list.innerHTML = "";

    let total = 0;
    let count = 0;

    cart.forEach(item => {
        total += item.price * item.qty;
        count += item.qty;

        list.innerHTML += `
            <li class="cart-card">
                <img src="${item.images[0]}" class="cart-img">
                <div class="cart-info">
                    <h6>${item.name}</h6>
                    <p>₹${item.price}</p>
                    <div class="qty-box">
                        <span onclick="changeCartQty(${item.id},-1)">-</span>
                        ${item.qty}
                        <span onclick="changeCartQty(${item.id},1)">+</span>
                    </div>
                </div>
                <span onclick="removeItem(${item.id})">❌</span>
            </li>
        `;
    });

    document.getElementById("totalPrice").innerText = "Total: ₹" + total;
    document.getElementById("cartCount").innerText = count;
}

function changeCartQty(id, val){
    const item = cart.find(p => p.id === id);
    item.qty += val;

    if(item.qty <= 0){
        cart = cart.filter(p => p.id !== id);
    }

    renderCart();
    localStorage.setItem("cart", JSON.stringify(cart));
}

function removeItem(id){
    cart = cart.filter(item => item.id !== id);
    renderCart();
    localStorage.setItem("cart", JSON.stringify(cart));
}

function toggleCart(){
    document.getElementById("cartSidebar").classList.toggle("active");
}

function goBack(){
    document.getElementById("productDetail").classList.add("d-none");
    document.querySelector(".product-ui").classList.remove("d-none");
}

// 💳 BUY NOW (SINGLE PRODUCT)
function buyNow(){
    let total = selectedProduct.price * quantity;
    openRazorpay(total, selectedProduct.name);
}

// 💳 FULL CART PAYMENT
function payNow(){
    let total = 0;
    cart.forEach(item => total += item.price * item.qty);

    if(total === 0){
        alert("Cart empty!");
        return;
    }

    openRazorpay(total, "Cart Payment");
}

// ✅ COMMON RAZORPAY FUNCTION
function openRazorpay(total, desc){
    var options = {
        key: "rzp_test_Sgx9RI8no2lKpb", // YOUR API KEY
        amount: total * 100,
        currency: "INR",
        name: "Kidz Robotics",
        description: desc,

        prefill: {
            name: "Customer",
            email: "test@gmail.com",
            contact: "9876543210"
        },

        method: {
            upi: true
        },

        handler: function (response){
            alert("Payment Successful ✅ ID: " + response.razorpay_payment_id);
            cart = [];
            localStorage.removeItem("cart");
            renderCart();
        },

        theme: {
            color: "#00c6ff"
        }
    };

    var rzp1 = new Razorpay(options);
    rzp1.open();
}

// INIT
renderCart();
</script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</body>
